<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brain Electricity Parallax Reel</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <div class="frame">
        <div class="background-orb orb-top"></div>
        <div class="background-orb orb-bottom"></div>
        <div class="background-noise"></div>
        <div class="background-vignette"></div>

        <section class="copy" aria-live="polite">
          <div class="copy-block" id="copy-block">
            <p class="line" id="line-1"></p>
            <p class="line" id="line-2"></p>
            <p class="line" id="line-3"></p>
          </div>
        </section>

        <section class="signal-stage" aria-hidden="true">
          <div class="grid"></div>
          <div class="glass glass-back"></div>
          <div class="glass glass-front"></div>
          <svg class="signal-svg" viewBox="0 0 900 600" preserveAspectRatio="none">
            <defs>
              <linearGradient id="paraGlow" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#4ddcff" stop-opacity="0.06" />
                <stop offset="38%" stop-color="#4ddcff" stop-opacity="0.84" />
                <stop offset="68%" stop-color="#9ca3ff" stop-opacity="0.92" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0.22" />
              </linearGradient>
              <filter id="paraBlur" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="8" result="blur" />
                <feMerge>
                  <feMergeNode in="blur" />
                  <feMergeNode in="SourceGraphic" />
                </feMerge>
              </filter>
            </defs>
            <path class="signal-glow" id="signal-glow"></path>
            <path class="signal-line" id="signal-line"></path>
          </svg>
        </section>
      </div>
    </main>
    <script src="app.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brain Electricity Pulse Reel</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <div class="frame">
        <div class="aura aura-one"></div>
        <div class="aura aura-two"></div>
        <div class="noise"></div>
        <div class="vignette"></div>

        <section class="copy" aria-live="polite">
          <div class="copy-lines">
            <p class="line line-1" id="line-1"></p>
            <p class="line line-2" id="line-2"></p>
            <p class="line line-3" id="line-3"></p>
          </div>
        </section>

        <section class="signal-stage" aria-hidden="true">
          <div class="grid"></div>
          <div class="signal-core"></div>
          <svg class="signal-svg" viewBox="0 0 900 600" preserveAspectRatio="none">
            <defs>
              <linearGradient id="pulseGlow" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#4fdfff" stop-opacity="0.08" />
                <stop offset="40%" stop-color="#4fdfff" stop-opacity="0.82" />
                <stop offset="72%" stop-color="#8f94ff" stop-opacity="0.96" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0.25" />
              </linearGradient>
              <filter id="pulseBlur" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="8" result="blur" />
                <feMerge>
                  <feMergeNode in="blur" />
                  <feMergeNode in="SourceGraphic" />
                </feMerge>
              </filter>
            </defs>
            <path class="signal-glow" id="signal-glow"></path>
            <path class="signal-line" id="signal-line"></path>
          </svg>
        </section>
      </div>
    </main>
    <script src="app.js"></script>
  </body>
</html>

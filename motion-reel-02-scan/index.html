<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brain Electricity Scan Reel</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <div class="frame">
        <div class="ambient ambient-left"></div>
        <div class="ambient ambient-right"></div>
        <div class="scan-beam"></div>
        <div class="grain"></div>
        <div class="frame-shadow"></div>

        <section class="copy" aria-live="polite">
          <div class="copy-panel"></div>
          <div class="copy-lines">
            <p class="line" id="line-1"></p>
            <p class="line" id="line-2"></p>
            <p class="line" id="line-3"></p>
          </div>
        </section>

        <section class="signal-stage" aria-hidden="true">
          <div class="grid"></div>
          <svg class="signal-svg" viewBox="0 0 900 600" preserveAspectRatio="none">
            <defs>
              <linearGradient id="scanGlow" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#43d9ff" stop-opacity="0.05" />
                <stop offset="44%" stop-color="#43d9ff" stop-opacity="0.88" />
                <stop offset="74%" stop-color="#ffffff" stop-opacity="0.96" />
                <stop offset="100%" stop-color="#91a2ff" stop-opacity="0.18" />
              </linearGradient>
              <filter id="scanBlur" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="7" result="blur" />
                <feMerge>
                  <feMergeNode in="blur" />
                  <feMergeNode in="SourceGraphic" />
                </feMerge>
              </filter>
            </defs>
            <path class="signal-glow" id="signal-glow"></path>
            <path class="signal-line" id="signal-line"></path>
          </svg>
        </section>
      </div>
    </main>
    <script src="app.js"></script>
  </body>
</html>

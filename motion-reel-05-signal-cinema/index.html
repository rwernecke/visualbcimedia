<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VisualBCI Signal Cinema Reel</title>
    <style>
      :root {
        --bg0: #02050b;
        --bg1: #06101c;
        --bg2: #0a1628;
        --ink: #f4f8ff;
        --muted: rgba(217, 229, 245, 0.7);
        --muted-soft: rgba(202, 218, 239, 0.46);
        --cyan: #72e7ff;
        --blue: #8dacff;
        --violet: #9a90ff;
        --frame-width: min(100vw, calc(100vh * 9 / 16));
        --frame-height: min(100vh, calc(100vw * 16 / 9));
        --pad-x: clamp(34px, 4.8vw, 56px);
        --pad-y: clamp(42px, 5vh, 66px);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at 50% 0%, rgba(37, 78, 133, 0.35), transparent 30%),
          linear-gradient(180deg, #02040a 0%, #07101a 46%, #02040a 100%);
      }

      body {
        display: grid;
        place-items: center;
        overflow: hidden;
        color: var(--ink);
        font-family: "SF Pro Display", "Avenir Next", "Helvetica Neue", sans-serif;
      }

      .frame {
        position: relative;
        width: var(--frame-width);
        height: var(--frame-height);
        aspect-ratio: 9 / 16;
        overflow: hidden;
        background:
          radial-gradient(circle at 68% 34%, rgba(114, 231, 255, 0.08), transparent 22%),
          radial-gradient(circle at 34% 68%, rgba(141, 172, 255, 0.08), transparent 28%),
          linear-gradient(180deg, var(--bg0) 0%, var(--bg1) 48%, var(--bg0) 100%);
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.05),
          0 34px 100px rgba(0, 0, 0, 0.54);
      }

      canvas,
      .veil,
      .scan,
      .overlay,
      .vignette {
        position: absolute;
        inset: 0;
      }

      canvas {
        width: 100%;
        height: 100%;
      }

      .veil {
        background:
          radial-gradient(circle at 56% 42%, rgba(114, 231, 255, 0.11), transparent 15%),
          radial-gradient(circle at 51% 47%, rgba(154, 144, 255, 0.08), transparent 24%);
        mix-blend-mode: screen;
        animation: veilShift 8s ease-in-out infinite;
        pointer-events: none;
      }

      .scan {
        background:
          repeating-linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.018) 0 1px,
            transparent 1px 5px
          );
        opacity: 0.22;
        mix-blend-mode: soft-light;
        pointer-events: none;
      }

      .overlay {
        z-index: 3;
        padding: var(--pad-y) var(--pad-x);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        pointer-events: none;
      }

      .topline {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
      }

      .brand,
      .meta,
      .annotation,
      .caption {
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      .brand {
        margin: 0;
        font-size: clamp(10px, 1vw, 12px);
        color: rgba(224, 236, 250, 0.72);
      }

      .brand::before {
        content: "";
        display: inline-block;
        width: 8px;
        height: 8px;
        margin-right: 10px;
        border-radius: 50%;
        background: radial-gradient(circle, #d4fbff 0%, var(--cyan) 55%, rgba(114, 231, 255, 0) 100%);
        box-shadow: 0 0 18px rgba(114, 231, 255, 0.4);
        vertical-align: middle;
      }

      .meta {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 9px 12px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(8, 15, 27, 0.42);
        color: rgba(218, 231, 247, 0.56);
        font-size: 10px;
        backdrop-filter: blur(14px);
      }

      .meta::before {
        content: "";
        width: 24px;
        height: 1px;
        background: linear-gradient(90deg, rgba(114, 231, 255, 0.2), rgba(114, 231, 255, 0.85));
      }

      .bottom {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        gap: 18px;
      }

      .copy {
        display: grid;
        gap: 10px;
        width: min(34%, 280px);
        margin-bottom: 2%;
        animation: copyDrift 8s ease-in-out infinite;
      }

      .headline {
        margin: 0;
        font-size: clamp(34px, 3.3vw, 48px);
        line-height: 0.96;
        letter-spacing: -0.05em;
        font-weight: 510;
        max-width: 8ch;
      }

      .headline .glow {
        color: #ffffff;
        text-shadow: 0 0 22px rgba(114, 231, 255, 0.14);
      }

      .caption {
        margin: 0;
        font-size: clamp(11px, 1vw, 12px);
        color: var(--muted-soft);
      }

      .annotation-stack {
        position: relative;
        width: min(28%, 240px);
        height: 180px;
      }

      .annotation {
        position: absolute;
        display: flex;
        align-items: center;
        gap: 10px;
        color: rgba(217, 230, 246, 0.5);
        font-size: 10px;
        opacity: 0;
        animation: noteFade 8s ease-in-out infinite;
      }

      .annotation::before {
        content: "";
        width: 26px;
        height: 1px;
        background: linear-gradient(90deg, rgba(255, 255, 255, 0.04), rgba(114, 231, 255, 0.8));
      }

      .annotation.one {
        top: 12px;
        right: 12px;
        animation-delay: 0.5s;
      }

      .annotation.two {
        top: 72px;
        right: 52px;
        animation-delay: 2.2s;
      }

      .annotation.three {
        bottom: 10px;
        right: 4px;
        animation-delay: 4.4s;
      }

      .vignette {
        background: radial-gradient(circle at center, transparent 44%, rgba(0, 0, 0, 0.55) 100%);
        pointer-events: none;
      }

      @keyframes veilShift {
        0%,
        100% {
          opacity: 0.8;
          transform: scale(1) translate3d(0, 0, 0);
        }
        50% {
          opacity: 1;
          transform: scale(1.04) translate3d(0, -1.2%, 0);
        }
      }

      @keyframes copyDrift {
        0%,
        100% {
          transform: translate3d(0, 0, 0);
        }
        50% {
          transform: translate3d(0, -7px, 0);
        }
      }

      @keyframes noteFade {
        0%,
        100% {
          opacity: 0;
          transform: translate3d(0, 10px, 0);
        }
        12%,
        56% {
          opacity: 0.52;
          transform: translate3d(0, 0, 0);
        }
        74% {
          opacity: 0.18;
        }
      }
    </style>
  </head>
  <body>
    <main class="frame">
      <canvas id="scene" width="1080" height="1920" aria-hidden="true"></canvas>
      <div class="veil"></div>
      <div class="scan"></div>

      <section class="overlay" aria-label="VisualBCI reel">
        <div class="topline">
          <p class="brand">VisualBCI</p>
          <div class="meta">Signal Environment</div>
        </div>

        <div class="bottom">
          <div class="copy">
            <h1 class="headline">See the <span class="glow">signal.</span></h1>
            <p class="caption">Read EEG with VisualBCI</p>
          </div>

          <div class="annotation-stack" aria-hidden="true">
            <div class="annotation one">Alpha</div>
            <div class="annotation two">Occipital</div>
            <div class="annotation three">Noise Floor</div>
          </div>
        </div>
      </section>

      <div class="vignette"></div>
    </main>

    <script>
      const duration = 8000;
      const canvas = document.getElementById("scene");
      const context = canvas.getContext("2d");

      function resizeCanvas() {
        const rect = canvas.getBoundingClientRect();
        const ratio = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width = Math.round(rect.width * ratio);
        canvas.height = Math.round(rect.height * ratio);
        context.setTransform(ratio, 0, 0, ratio, 0, 0);
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function roundedRectPath(x, y, width, height, radius) {
        const corner = Math.min(radius, width / 2, height / 2);
        context.beginPath();
        context.moveTo(x + corner, y);
        context.lineTo(x + width - corner, y);
        context.quadraticCurveTo(x + width, y, x + width, y + corner);
        context.lineTo(x + width, y + height - corner);
        context.quadraticCurveTo(x + width, y + height, x + width - corner, y + height);
        context.lineTo(x + corner, y + height);
        context.quadraticCurveTo(x, y + height, x, y + height - corner);
        context.lineTo(x, y + corner);
        context.quadraticCurveTo(x, y, x + corner, y);
        context.closePath();
      }

      function smoothPath(points) {
        if (points.length < 2) {
          return;
        }

        context.beginPath();
        context.moveTo(points[0].x, points[0].y);

        for (let index = 1; index < points.length - 1; index += 1) {
          const current = points[index];
          const next = points[index + 1];
          const midX = (current.x + next.x) / 2;
          const midY = (current.y + next.y) / 2;
          context.quadraticCurveTo(current.x, current.y, midX, midY);
        }

        const last = points[points.length - 1];
        context.lineTo(last.x, last.y);
      }

      function buildWave(width, height, time, options = {}) {
        const {
          baseline = 0.5,
          amplitude = 90,
          frequency = 1.4,
          offset = 0,
          drift = 0,
          detail = 1,
          segments = 160
        } = options;

        const left = width * 0.06;
        const right = width * 0.94;
        const span = right - left;
        const baseY = height * baseline;
        const points = [];

        for (let index = 0; index <= segments; index += 1) {
          const p = index / segments;
          const x = left + span * p;
          const phase = p * Math.PI * 2 * frequency + offset;
          const envelope =
            0.62 +
            0.28 * Math.sin(p * Math.PI * 1.6 + time * Math.PI * 2 + offset) +
            0.08 * Math.cos(p * Math.PI * 8.2 - time * Math.PI * 4);
          const y =
            baseY +
            Math.sin(phase + time * Math.PI * 2.5) * amplitude * envelope +
            Math.cos((phase * 2.6 - time * Math.PI * 5.4) * detail) * amplitude * 0.16 +
            Math.sin((p * 12 - time * 1.1 + drift) * Math.PI) * amplitude * 0.09;

          points.push({ x, y });
        }

        return points;
      }

      function pointOn(points, t) {
        const ratio = clamp(t, 0, 0.9999) * (points.length - 1);
        const index = Math.floor(ratio);
        const mix = ratio - index;
        const a = points[index];
        const b = points[Math.min(index + 1, points.length - 1)];
        return {
          x: a.x + (b.x - a.x) * mix,
          y: a.y + (b.y - a.y) * mix
        };
      }

      function drawBackground(width, height, time) {
        const gradient = context.createLinearGradient(0, 0, 0, height);
        gradient.addColorStop(0, "#02050b");
        gradient.addColorStop(0.44, "#071220");
        gradient.addColorStop(1, "#02050b");
        context.fillStyle = gradient;
        context.fillRect(0, 0, width, height);

        const bloom = context.createRadialGradient(
          width * 0.54,
          height * 0.44,
          0,
          width * 0.54,
          height * 0.44,
          width * 0.34
        );
        bloom.addColorStop(0, "rgba(86, 183, 255, 0.16)");
        bloom.addColorStop(0.34, "rgba(86, 183, 255, 0.05)");
        bloom.addColorStop(1, "rgba(86, 183, 255, 0)");
        context.fillStyle = bloom;
        context.fillRect(0, 0, width, height);

        const driftGlow = context.createRadialGradient(
          width * (0.28 + Math.sin(time * Math.PI * 2) * 0.01),
          height * 0.66,
          0,
          width * 0.28,
          height * 0.66,
          width * 0.22
        );
        driftGlow.addColorStop(0, "rgba(114, 231, 255, 0.09)");
        driftGlow.addColorStop(1, "rgba(114, 231, 255, 0)");
        context.fillStyle = driftGlow;
        context.fillRect(0, 0, width, height);
      }

      function drawGrid(width, height, time) {
        context.save();
        context.translate(Math.sin(time * Math.PI * 2) * 8, Math.cos(time * Math.PI * 2) * 10);
        context.strokeStyle = "rgba(122, 163, 220, 0.07)";
        context.lineWidth = 1;

        for (let x = width * 0.08; x <= width * 0.92; x += width * 0.08) {
          context.beginPath();
          context.moveTo(x, height * 0.14);
          context.lineTo(x, height * 0.88);
          context.stroke();
        }

        for (let y = height * 0.14; y <= height * 0.88; y += height * 0.04) {
          context.beginPath();
          context.moveTo(width * 0.08, y);
          context.lineTo(width * 0.92, y);
          context.stroke();
        }

        context.restore();
      }

      function drawFocusWindow(width, height, time) {
        const x = width * 0.17;
        const y = height * 0.22;
        const w = width * 0.68;
        const h = height * 0.34;

        const gradient = context.createLinearGradient(x, y, x, y + h);
        gradient.addColorStop(0, "rgba(255, 255, 255, 0.04)");
        gradient.addColorStop(1, "rgba(255, 255, 255, 0.01)");
        context.fillStyle = gradient;
        context.strokeStyle = "rgba(255, 255, 255, 0.06)";
        context.lineWidth = 1;
        roundedRectPath(x, y, w, h, 30);
        context.fill();
        context.stroke();

        const scanX = x + w * (0.14 + time * 0.72);
        const scan = context.createLinearGradient(scanX - 40, y, scanX + 40, y);
        scan.addColorStop(0, "rgba(114,231,255,0)");
        scan.addColorStop(0.5, "rgba(114,231,255,0.12)");
        scan.addColorStop(1, "rgba(114,231,255,0)");
        context.fillStyle = scan;
        context.fillRect(scanX - 40, y, 80, h);
      }

      function drawWave(points, stroke, glow, width, alpha) {
        context.save();
        context.globalAlpha = alpha;
        context.strokeStyle = stroke;
        context.lineWidth = width;
        context.lineCap = "round";
        context.lineJoin = "round";
        context.shadowBlur = width * 4;
        context.shadowColor = glow;
        smoothPath(points);
        context.stroke();
        context.restore();
      }

      function drawPulse(points, time) {
        const positions = [time % 1, (time + 0.32) % 1];
        positions.forEach((value, index) => {
          const point = pointOn(points, value);
          const radius = 26 + Math.sin(time * Math.PI * 4 + index) * 2;
          const gradient = context.createRadialGradient(point.x, point.y, 0, point.x, point.y, radius);
          gradient.addColorStop(0, "rgba(255,255,255,0.9)");
          gradient.addColorStop(0.26, "rgba(114,231,255,0.48)");
          gradient.addColorStop(1, "rgba(114,231,255,0)");
          context.fillStyle = gradient;
          context.beginPath();
          context.arc(point.x, point.y, radius, 0, Math.PI * 2);
          context.fill();
        });
      }

      function drawParticles(points, time) {
        for (let index = 0; index < 20; index += 1) {
          const pos = (index / 20 + time * 0.12) % 1;
          const point = pointOn(points, pos);
          const offsetY = Math.sin(time * Math.PI * 6 + index) * 14;
          context.fillStyle = "rgba(202, 244, 255, 0.22)";
          context.beginPath();
          context.arc(point.x, point.y + offsetY, 2.4, 0, Math.PI * 2);
          context.fill();
        }
      }

      function drawSpectrum(width, height, time) {
        const x = width * 0.82;
        const baseY = height * 0.3;
        const barW = width * 0.007;
        const gap = width * 0.009;

        for (let index = 0; index < 10; index += 1) {
          const h =
            height *
            (0.04 + 0.045 * Math.abs(Math.sin(time * Math.PI * 4.6 + index * 0.48)));
          const y = baseY + index * 24;
          const gradient = context.createLinearGradient(x, y, x, y + h);
          gradient.addColorStop(0, "rgba(114, 231, 255, 0.92)");
          gradient.addColorStop(1, "rgba(114, 231, 255, 0.12)");
          context.fillStyle = gradient;
          roundedRectPath(x + index * gap, y, barW, h, 8);
          context.fill();
        }
      }

      function drawDataTicks(width, height, time) {
        context.save();
        context.font = "500 10px SF Mono, SFMono-Regular, ui-monospace, Menlo, monospace";
        context.fillStyle = "rgba(214, 228, 247, 0.42)";
        const labels = [
          { text: "ALPHA", x: width * 0.17, y: height * 0.2 },
          { text: "10 HZ", x: width * 0.82, y: height * 0.26 },
          { text: "OCCIPITAL TRACE", x: width * 0.17, y: height * 0.59 }
        ];

        labels.forEach((label, index) => {
          context.globalAlpha = 0.34 + 0.16 * Math.sin(time * Math.PI * 2 + index);
          context.fillText(label.text, label.x, label.y);
        });
        context.restore();
      }

      function render(now) {
        const width = canvas.clientWidth;
        const height = canvas.clientHeight;
        const time = (now % duration) / duration;
        const drift = Math.sin(time * Math.PI * 2) * 12;

        context.clearRect(0, 0, width, height);
        drawBackground(width, height, time);

        context.save();
        context.translate(0, drift);
        drawGrid(width, height, time);
        drawFocusWindow(width, height, time);

        const backWave = buildWave(width, height, time, {
          baseline: 0.33,
          amplitude: 44,
          frequency: 1.1,
          offset: 0.8,
          drift: 0.6,
          detail: 0.82
        });
        const midWave = buildWave(width, height, time, {
          baseline: 0.44,
          amplitude: 62,
          frequency: 1.28,
          offset: 1.4,
          drift: 1.1,
          detail: 0.94
        });
        const mainWave = buildWave(width, height, time, {
          baseline: 0.57,
          amplitude: 100,
          frequency: 1.5,
          offset: 0.2,
          drift: 2.1,
          detail: 1
        });

        drawWave(backWave, "rgba(123, 164, 222, 0.18)", "rgba(123, 164, 222, 0.08)", 1.4, 1);
        drawWave(midWave, "rgba(132, 198, 255, 0.25)", "rgba(114, 231, 255, 0.09)", 1.8, 1);
        drawWave(mainWave, "rgba(243, 248, 255, 0.9)", "rgba(114, 231, 255, 0.34)", 3.1, 1);

        drawPulse(mainWave, time);
        drawParticles(mainWave, time);
        drawSpectrum(width, height, time);
        drawDataTicks(width, height, time);
        context.restore();

        window.requestAnimationFrame(render);
      }

      resizeCanvas();
      window.addEventListener("resize", resizeCanvas);
      window.requestAnimationFrame(render);
    </script>
  </body>
</html>
